name: tests-dotfiles
services:
  test-nixos-modules:
    image: docker.io/nixos/nix:latest
    volumes:
      - ../:/app
    working_dir: /app
    environment:
      SKIP_ZSH_RUNTIME_TEST: "1"
    command: ["/app/tests/test-nixos-modules.sh"]

  test-zsh-ubuntu:
    image: docker.io/library/ubuntu:latest
    volumes:
      - ../:/app
    working_dir: /app
    command: ["/bin/sh", "-c", "/app/install_zsh.sh && echo 'running instantiat of zsh' && zsh -f -c 'source ~/.zshrc && zsh -f -c \"source ~/.zshrc\"' "]

  test-zsh-arch:
    image: docker.io/library/archlinux:latest
    volumes:
      - ../:/app
    working_dir: /app
    command: ["/bin/sh", "-c", "/app/install_zsh.sh && echo 'running instantiat of zsh' && zsh -f -c 'source ~/.zshrc && zsh -f -c \"source ~/.zshrc\"' "]


  test-zsh-fedora:
    image: docker.io/library/fedora:latest
    volumes:
      - ../:/app
    working_dir: /app
    command: ["/bin/sh", "-c", "/app/install_zsh.sh && echo 'running instantiat of zsh' && zsh -f -c 'source ~/.zshrc && zsh -f -c \"source ~/.zshrc\"' "]
